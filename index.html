<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
async function exportPDF() {
  const { jsPDF } = window.jspdf;

  const table = document.getElementById("tabelle");
  const pdf = new jsPDF("l", "mm", "a4");
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();

  // === Logo laden ===
  const logoUrl = "ccc_bg.jpeg";
  const loadImage = (src) =>
    new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });

  let logoWidth = 0,
    logoHeight = 0;
  try {
    const logoImg = await loadImage(logoUrl);
    const aspect = logoImg.width / logoImg.height;
    logoHeight = 15; // mm
    logoWidth = logoHeight * aspect;
    pdf.addImage(logoImg, "JPEG", 10, 8, logoWidth, logoHeight);
  } catch (e) {
    console.warn("Logo konnte nicht geladen werden:", e);
  }

  // === Titel & Datum ===
  const titel = "Strafen Kegeln – Cone Club Coesfeld";
  const datum = new Date().toLocaleDateString("de-DE");
  pdf.setFont("helvetica", "bold");
  pdf.setFontSize(18);
  pdf.text(titel, pageWidth / 2, 15, { align: "center" });
  pdf.setFont("helvetica", "normal");
  pdf.setFontSize(10);
  pdf.text(`Datum: ${datum}`, pageWidth - 10, 18, { align: "right" });

  // ===== Inhalt für Screenshot: Zähler + Tabellen-Klon =====
  const alle9Val = document.getElementById("alle9Count")?.textContent ?? "0";
  const kranzVal = document.getElementById("kranzCount")?.textContent ?? "0";
  const marvinVal = document.getElementById("MarvinCount")?.textContent ?? "0";
  const leonVal = document.getElementById("LeonCount")?.textContent ?? "0";

  // Offscreen Wrapper erstellen
  const wrapper = document.createElement("div");
  wrapper.style.position = "fixed";
  wrapper.style.left = "-10000px";
  wrapper.style.top = "0";
  wrapper.style.background = "#ffffff";
  wrapper.style.padding = "10px";
  wrapper.style.boxSizing = "border-box";
  wrapper.style.width = table.offsetWidth + "px";

  // Zählerzeile (über der Tabelle im Screenshot)
  const info = document.createElement("div");
  info.style.display = "flex";
  info.style.justifyContent = "space-between";
  info.style.alignItems = "center";
  info.style.fontSize = "16px";
  info.style.fontWeight = "700";
  info.style.marginBottom = "10px";
  info.innerHTML = `
    <div>Alle 9: <span>${alle9Val}</span> &nbsp;&nbsp;|&nbsp;&nbsp; Kranz: <span>${kranzVal}</span></div>
    <div>Team Marvin: <span>${marvinVal}</span> &nbsp;&nbsp;|&nbsp;&nbsp; Team Leon: <span>${leonVal}</span></div>
  `;
  wrapper.appendChild(info);

  // Tabelle klonen (Safari-safe: sticky aus)
  const clone = table.cloneNode(true);
  clone.querySelectorAll("th").forEach((th) => (th.style.position = "static"));

  // "Gezahlte Strafen" größer im PDF (nur im Klon)
  clone.querySelectorAll("tbody tr").forEach((r) => {
    const first = r.cells?.[0]?.textContent || "";
    if (first.includes("Gezahlte Strafen")) {
      r.style.fontSize = "20px";
      r.style.fontWeight = "800";
      Array.from(r.cells).forEach((td) => {
        td.style.paddingTop = "14px";
        td.style.paddingBottom = "14px";
      });
    }
  });

  wrapper.appendChild(clone);
  document.body.appendChild(wrapper);

  // kurze Pause für Safari Layout
  await new Promise((r) => setTimeout(r, 80));

  // iPad: moderat, Desktop: höher
  const isIPad =
    /iPad|Macintosh/.test(navigator.userAgent) && "ontouchend" in document;
  const captureScale = isIPad ? 1.5 : 3;

  const canvas = await html2canvas(wrapper, {
    scale: captureScale,
    useCORS: true,
    backgroundColor: "#ffffff",
    scrollX: 0,
    scrollY: 0,
  });

  wrapper.remove();

  const imgData = canvas.toDataURL("image/png");

  // === Tabelle+Zähler ins PDF einfügen (unter Header) ===
  const imgWidth = pageWidth - 20;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;
  let y = 28;

  if (imgHeight <= pageHeight - y - 10) {
    // passt auf eine Seite
    pdf.addImage(imgData, "PNG", 10, y, imgWidth, imgHeight);
  } else {
    // mehrseitig
    let position = 0;
    const usableHeightMm = pageHeight - y - 10;
    const pageHeightPx = (canvas.height * usableHeightMm) / imgHeight;

    while (position < canvas.height) {
      const pageCanvas = document.createElement("canvas");
      pageCanvas.width = canvas.width;
      pageCanvas.height = pageHeightPx;

      const ctx = pageCanvas.getContext("2d");
      ctx.drawImage(canvas, 0, -position);

      const pageData = pageCanvas.toDataURL("image/png");
      pdf.addImage(pageData, "PNG", 10, y, imgWidth, usableHeightMm);

      position += pageHeightPx;
      if (position < canvas.height) pdf.addPage();
    }
  }

  // === Footer ===
  pdf.setFontSize(9);
  pdf.text(
    "Erstellt mit der Kegel-App – Cone Club Coesfeld",
    pageWidth / 2,
    pageHeight - 6,
    { align: "center" }
  );

  // === PDF speichern ===
  pdf.save(`Kegel_Stand_${datum}.pdf`);
}

    function saveState() {

    teamCounts
  }));

    function undo() {
      if (!history.length) return;
      const state = JSON.parse(history.pop());
      if (state.spieler) {
        spieler = [...state.spieler];
        }

      // Arrays auf korrekte Länge bringen (falls Spieleranzahl sich geändert hat)
    aktiv.length = spieler.length;
    ausstand.length = spieler.length;

    gezahlt.length = spieler.length;
    offeneStrafen.length = spieler.length;

    eingabetext.Runden.length = spieler.length;

    spielstrafenLocked.forEach(r => r.length = spieler.length);

    clicks.forEach(r => r.length = spieler.length);

      Object.assign(textLocked, state.textLocked);
      Object.assign(spielstrafen, state.spielstrafen);

      Object.assign(ausstand, state.ausstand);
      Object.assign(ausstandLocked, state.ausstandLocked);
      Object.assign(gezahlt, state.gezahlt);
      if (state.specialTriggers) specialTriggers = state.specialTriggers;
       if (state.teamCounts) teamCounts = state.teamCounts;
      render();
    }

    function save() {
      alert("Speichern (Simulation) abgeschlossen.");
    }

    function toggleAnwesenheit(i) {
  if (i >= BASE_SPIELER_ANZAHL) return; // Gäste immer anwesend, kein Toggle
  aktiv[i] = !aktiv[i];
  render();
}

    function openGuestModal() {
  document.getElementById("guestName").value = "";
  document.getElementById("guestModal").style.display = "block";
  setTimeout(() => document.getElementById("guestName").focus(), 50);
}

function closeGuestModal() {
  document.getElementById("guestModal").style.display = "none";
}

function confirmGuest() {
  const input = document.getElementById("guestName");
  const name = (input.value || "").trim();

  if (!name) {
    alert("Bitte einen Namen eingeben.");
    input.focus();
    return;
  }

  // optional: doppelte Namen verhindern
  if (spieler.includes(name)) {
    alert("Den Namen gibt es schon.");
    input.focus();
    return;
  }

  saveState(); // wichtig für Undo!

  // 1) Spieler hinzufügen
  spieler.push(name);

  // 2) Alle Datenstrukturen verlängern
  aktiv.push(true);

  clicks.forEach(row => row.push(0));

  eingabetext.Kegelbahn.push("");
  eingabetext.Runden.push("");
  textLocked.Kegelbahn.push(false);
  textLocked.Runden.push(false);

  spielstrafen.forEach(r => r.push(""));
  spielstrafenLocked.forEach(r => r.push(false));

  ausstand.push("");
  ausstandLocked.push(false);

  gezahlt.push("");
  offeneStrafen.push("");

  closeGuestModal();
  render();
}

   

    function updateTeamZaehler() {
      document.getElementById("MarvinCount").textContent = teamCounts.Marvin;
      document.getElementById("LeonCount").textContent = teamCounts.Leon;
    }

    function incrementTeam(team) {
      // Klick auf ein Team = dieses Team hat GEWONNEN.
      // Daher bekommt das andere Team (Verlierer) "Spiel verloren" +1 (nur anwesende Spieler).
      saveState();

      teamCounts[team] = (teamCounts[team] || 0) + 1;

      const losingTeam = team === "Marvin" ? "Leon" : "Marvin";
      const spielVerlorenIndex = strafen.findIndex(s => s[0] === "Spiel verloren");

      if (spielVerlorenIndex !== -1) {
        teams[losingTeam].forEach(playerIndex => {
          if (aktiv[playerIndex]) {
            clicks[spielVerlorenIndex][playerIndex]++;
          }
        });
      }

      updateTeamZaehler();
      render();
      saveToLocalStorage();
    }

function updateSonderStrafenZaehler() {
  const alle9Index = strafen.findIndex(s => s[0] === "Alle 9ne");
  const kranzIndex = strafen.findIndex(s => s[0] === "Kranz");

  const alle9Summe = alle9Index >= 0 ? clicks[alle9Index].reduce((a, b) => a + b, 0) : 0;
  const kranzSumme = kranzIndex >= 0 ? clicks[kranzIndex].reduce((a, b) => a + b, 0) : 0;

  document.getElementById("alle9Count").textContent = specialTriggers["Alle 9ne"] || alle9Summe || 0;
  document.getElementById("kranzCount").textContent = specialTriggers["Kranz"] || kranzSumme || 0;
}
  
    function flashRow(rowIndex) {
  // kleine Verzögerung, damit die Zeile schon im DOM ist
  setTimeout(() => {
    const tabelle = document.getElementById("tabelle");
    const rows = tabelle.querySelectorAll("tbody tr");
    const row = rows[rowIndex];
    if (!row) return;

    row.classList.add("flash");           // Klasse hinzufügen → leuchten
    setTimeout(() => row.classList.remove("flash"), 1000); // nach 1s entfernen
  }, 50); // 50ms Verzögerung
}
    function flashRowByName(strafenName) {
  setTimeout(() => {
    const tabelle = document.getElementById("tabelle");
    const rows = tabelle.querySelectorAll("tbody tr");

    // finde die Zeile, deren erste Zelle den Strafennamen enthält
    const row = Array.from(rows).find(r => r.cells[0].textContent.includes(strafenName));
    if (!row) return;

    row.classList.add("flash");           // Klasse hinzufügen → leuchten
    setTimeout(() => row.classList.remove("flash"), 1000); // nach 1s entfernen
  }, 50); // kleine Verzögerung
}


    function add(i, j) {
      if (!aktiv[j]) return;
  saveState();

  // Animation 
     flashRowByName(strafen[i][0]);


      const name = strafen[i][0];
      const betrag = strafen[i][1];
      const istVorteilStrafe = name === "Alle 9ne" || name === "Kranz";

      if (istVorteilStrafe) {
        specialTriggers[name] = (specialTriggers[name] || 0) + 1;
        const summenVorher = spieler.map((_, idx) =>
          strafen.reduce((sum, [_, b], si) => sum + clicks[si][idx] * b, 0)
        );

        for (let k = 0; k < spieler.length; k++) {
          if (k !== j && aktiv[k]) {
            clicks[i][k]++;
          }
        }

        const aktiveSummen = summenVorher.filter((_, idx) => aktiv[idx]);
        const durchschnitt = aktiveSummen.length
          ? aktiveSummen.reduce((a, b) => a + b, 0) / aktiveSummen.length
          : 0;

        for (let idx = 0; idx < aktiv.length; idx++) {
          if (!aktiv[idx]) {
            clicks[i][idx] += Math.round(durchschnitt / betrag);
          }
        }
      } else {
        clicks[i][j]++;
      }

      render();
    }


    function openResetModal() {
  document.getElementById("resetModal").style.display = "block";
}
function closeResetModal() {
  document.getElementById("resetModal").style.display = "none";
}

function doReset() {
  saveState();

  // Gäste weg
  spieler = spieler.slice(0, BASE_SPIELER_ANZAHL);

  // Arrays kürzen
  aktiv.length = BASE_SPIELER_ANZAHL;
  ausstand.length = BASE_SPIELER_ANZAHL;
  ausstandLocked.length = BASE_SPIELER_ANZAHL;
  gezahlt.length = BASE_SPIELER_ANZAHL;

  // Kegelbahn/Runden behalten
  eingabetext.Kegelbahn.length = BASE_SPIELER_ANZAHL;
  eingabetext.Runden.length = BASE_SPIELER_ANZAHL;
  textLocked.Kegelbahn.length = BASE_SPIELER_ANZAHL;
  textLocked.Runden.length = BASE_SPIELER_ANZAHL;

  // Offene Strafen behalten
  offeneStrafen.length = BASE_SPIELER_ANZAHL;

  // Klicks reset
  for (let s = 0; s < clicks.length; s++) {
    clicks[s].length = BASE_SPIELER_ANZAHL;
    for (let p = 0; p < BASE_SPIELER_ANZAHL; p++) clicks[s][p] = 0;
  }

  // Spielstrafen reset
  spielstrafen.forEach(r => {
    r.length = BASE_SPIELER_ANZAHL;
    for (let p = 0; p < BASE_SPIELER_ANZAHL; p++) r[p] = "";
  });
  spielstrafenLocked.forEach(r => {
    r.length = BASE_SPIELER_ANZAHL;
    for (let p = 0; p < BASE_SPIELER_ANZAHL; p++) r[p] = false;
  });

  // Ausstand reset
  for (let p = 0; p < BASE_SPIELER_ANZAHL; p++) {
    ausstand[p] = "";
    ausstandLocked[p] = false;
  }

  // Gezahlte reset
  for (let p = 0; p < BASE_SPIELER_ANZAHL; p++) gezahlt[p] = "";

  // Zähler reset
  specialTriggers = { "Alle 9ne": 0, "Kranz": 0 };
  teamCounts = { Marvin: 0, Leon: 0 };

  // Alle wieder anwesend
  for (let p = 0; p < BASE_SPIELER_ANZAHL; p++) aktiv[p] = true;

  closeResetModal();
  render();
  saveToLocalStorage();
}

    
    function render() {
  const t = document.getElementById("tabelle");

  const strafenMitClicks = strafen.map((s, i) => ({
    name: s[0],
    betrag: s[1],
    index: i,
    totalClicks: clicks[i].reduce((a, b) => a + b, 0)
  }));

  // Animation
  t.style.transition = "all 0.5s ease";

  // nach Häufigkeit sortieren
  strafenMitClicks.sort((a, b) => b.totalClicks - a.totalClicks);

const pumpeIndex = 0; // bleibt bei dir 0
const pumpeRow = strafenMitClicks.find(x => x.index === pumpeIndex);
const restRows = strafenMitClicks.filter(x => x.index !== pumpeIndex);

// Pumpe immer zuerst, Rest bleibt nach Klicks sortiert
const strafenOrdered = pumpeRow ? [pumpeRow, ...restRows] : restRows;
  const maxPumpe = Math.max(...clicks[pumpeIndex]);
  const pumpenkoenig = clicks[pumpeIndex].indexOf(maxPumpe);

      // --- Summen (nur Klick-Strafen) ---
  const summen = spieler.map((_, j) =>
    strafen.reduce((s, [_, b], i) => s + clicks[i][j] * b, 0)
  );

     // --- Podium (1/2/3) nach Gesamtbasis ohne Bonus-Geld ---
const gesamtBasis = spieler.map((_, i) => {
  const strafe = summen[i];
  const beitrag = 15;
  const ausstandWert = ausstand[i] === "2.50" ? 2.5 : 0;
  const spielstrafeSumme = spielstrafen.reduce((sum, r) => sum + (parseFloat(r[i]) || 0), 0);
  const offen = parseFloat(offeneStrafen[i]) || 0;
  return strafe + beitrag + ausstandWert + spielstrafeSumme + offen;
});

      function podiumClass(colIndex) {
  if (colIndex === platz1) return "podium1";
  if (colIndex === platz2) return "podium2";
  if (colIndex === platz3) return "podium3";
  return "";
}
      
const rankingAktiv = gesamtBasis
  .map((wert, index) => ({ index, wert }))
  .filter(o => aktiv[o.index])
  .sort((a, b) => a.wert - b.wert);

const platz1 = rankingAktiv[0]?.index ?? null;
const platz2 = rankingAktiv[1]?.index ?? null;
const platz3 = rankingAktiv[2]?.index ?? null;
      
  let html = "<thead><tr><th>Strafe</th>";

spieler.forEach((name, i) => {
  const isGuest = i >= BASE_SPIELER_ANZAHL;

  // Podium-Klasse für die ganze Spalte
  let podiumCls = "";
  if (i === platz1) podiumCls = "podium1";
  else if (i === platz2) podiumCls = "podium2";
  else if (i === platz3) podiumCls = "podium3";

  // ✅ ICON MUSS HIER OBEN STEHEN (vor html += ...)
  let podiumIcon = "";
  if (i === platz1) podiumIcon = "🥇";
  else if (i === platz2) podiumIcon = "🥈";
  else if (i === platz3) podiumIcon = "🥉";

  const koenigCls = (i === pumpenkoenig) ? "player-highlight" : "";
  const pumpeIcon = (i === pumpenkoenig) ? " 🎳" : "";

  if (isGuest) {
    html += `<th class="${podiumCls} ${koenigCls}">
      <div class="th-wrap">
        <div class="th-name">   ${podiumIcon ? podiumIcon + " " : ""}${name}${pumpeIcon} </div>
      </div>
    </th>`;
  } else {
    const check = aktiv[i] ? "checked" : "";
    html += `<th class="${podiumCls} ${koenigCls}">
      <div class="th-wrap">
        <input type="checkbox" onchange="toggleAnwesenheit(${i})" ${check}>
        <div class="th-name">   ${podiumIcon ? podiumIcon + " " : ""}${name}${pumpeIcon} </div>
      </div>
    </th>`;
  }
});


html += "</tr></thead><tbody>";


      

  // --- Strafen-Zeilen ---
  strafenOrdered.forEach(si => {
    const i = si.index;
    const name = si.name;
    const betrag = si.betrag;
    html += `<tr><td>${name} (€${betrag.toFixed(2)})</td>`;
    spieler.forEach((_, j) => {
  const pod = podiumClass(j);
  const mark = (i === pumpeIndex && j === pumpenkoenig) ? "highlight" : "";
  const disable = aktiv[j] ? "" : "style='background:#eee;pointer-events:none;color:#999;'";
  html += `<td class="${pod} ${mark}" ${disable} onclick="add(${i}, ${j})">${clicks[i][j]}</td>`;
});
    html += "</tr>";
  });

  let aktiveNurStrafen = gesamtBasis
    .map((wert, index) => ({ index, wert }))
    .filter(obj => aktiv[obj.index]);

  aktiveNurStrafen.sort((a, b) => a.wert - b.wert);

  // --- Zwischenbilanz ---
  html += "<tr class='zwischenbilanz'><td>Zwischen<br>bilanz</td>";
  summen.forEach((s, i) => {
    const red = s === Math.max(...summen) && s > 0 ? "max-rot" : "";
    const pod = podiumClass(i);
  html += `<td class="${pod} ${red}">${s.toFixed(2)}</td>`;
  });
  html += "</tr>";

  // --- Kegelbahn / Runden ---
  ["Kegelbahn", "Runden"].forEach(label => {
    html += `<tr><td>${label}</td>`;
    eingabetext[label].forEach((v, i) => {
      const dis = !aktiv[i] ? "disabled" : "";
      const pod = podiumClass(i);
    html += `<td class="${pod}"><input type="text" value="${v}" onchange="lockText('${label}', ${i}, this.value)" ${dis}></td>`;
    });
    html += "</tr>";
  });

  // --- Spielstrafe ---
  spielstrafen.forEach((row, r) => {
    html += `<tr><td>Spielstrafe</td>`;
    row.forEach((val, i) => {
      const isLocked = !!spielstrafenLocked[r][i];
      const dis = isLocked || !aktiv[i] ? "readonly" : "";
      let displayVal = "";

      if (val !== "" && val !== undefined && val !== null) {
        const num = parseFloat(String(val).replace(",", "."));
        if (!isNaN(num)) displayVal = num.toFixed(2);
      }

      if (isLocked && displayVal) displayVal = displayVal + " €";
      const pod = podiumClass(i);
    html += `<td class="${pod}"><input type="text" value="${displayVal}" onchange="lockStrafe(${r}, ${i}, this.value)" ${dis}></td>`;
    });
    html += `</tr>`;
  });

  // --- Mitgliedsbeitrag ---
  html += "<tr><td>Mitglieds<br>beitrag</td>" +
  spieler.map((_, i) => `<td class="${podiumClass(i)}">15.00</td>`).join("") +
  "</tr>";

  // --- Pumpenkönig / 2. Platz ---
  html += "<tr><td>Pumpenkönig / 2. Platz</td>" +
    spieler.map((_, i) => {
      const pod = podiumClass(i);
  if (i === pumpenkoenig) return `<td class="${pod} highlight">5.00</td>`;
  if (i === platz2) return `<td class="${pod} highlight">2.00</td>`;
  return `<td class="${pod}"></td>`;
    }).join("") +
    "</tr>";

  // --- Offene Strafen ---
  html += "<tr><td>Offene Strafen</td>" +
    offeneStrafen.map((v, i) => {
      const dis = aktiv[i] ? "" : "disabled";
      const style = v ? "background-color:#f9f7c5;" : "";
      let displayVal = v ? parseFloat(v).toFixed(2) + " €" : "";
      return `<td class="${podiumClass(i)}"><input type="text" value="${displayVal}" onchange="updateOffeneStrafen(${i}, this.value)" style="${style}" ${dis}></td>`;
    }).join("") +
    "</tr>";

  // --- Strafausstand ---
  html += "<tr><td>Strafausstand<br>+2,50€ je Kegeln</td>" +
    ausstand.map((v, i) => {
      const dis = aktiv[i] ? "" : "style='pointer-events:none;background:#eee;'";
      return `<td class="${podiumClass(i)}" ${dis} onclick="setAusstand(${i})">${v}</td>`;
    }).join("") +
    "</tr>";

// --- Gesamtstrafen ---
html += "<tr class='gesamtbilanz'><td>Gesamt<br>strafen</td>";

const aktiveIndices = spieler.map((_, i) => i).filter(i => aktiv[i]);

// Durchschnitt NUR aus: Strafen + Beitrag + Ausstand + Spielstrafe + Bonus (kein OffeneStrafen)
const gesamtAktive = aktiveIndices.map(i => {
  const strafe = summen[i];
  const beitrag = 15;
  const ausstandWert = ausstand[i] === "2.50" ? 2.5 : 0;

  let extraPlatz = 0;
  if (i === pumpenkoenig) extraPlatz = 5;
  else if (i === platz2) extraPlatz = 2;

  const zusatz = spielstrafen.reduce((sum, r) => sum + (parseFloat(r[i]) || 0), 0);

  return strafe + beitrag + ausstandWert + zusatz + extraPlatz;
});

const durchschnittAktiv =
  gesamtAktive.length > 0
    ? gesamtAktive.reduce((a, b) => a + b, 0) / gesamtAktive.length
    : 0;

spieler.forEach((_, i) => {
  const strafe = summen[i];
  const beitrag = 15;
  const ausstandWert = ausstand[i] === "2.50" ? 2.5 : 0;

  let extraPlatz = 0;
  if (i === pumpenkoenig) extraPlatz = 5;
  else if (i === platz2) extraPlatz = 2;

  const zusatz = spielstrafen.reduce((sum, r) => sum + (parseFloat(r[i]) || 0), 0);
  const offen = parseFloat(offeneStrafen[i]) || 0;

  const gesamt = strafe + beitrag + ausstandWert + zusatz + offen + extraPlatz;

  if (aktiv[i]) {
    html += `<td class="${podiumClass(i)}">${gesamt.toFixed(2)}</td>`;
  } else {
    html += `<td class="${podiumClass(i)}" style="color:blue;">${durchschnittAktiv.toFixed(2)}</td>`;
  }
});

html += "</tr>";


  // --- Gezahlte Strafen ---
  html += "<tr><td>Gezahlte Strafen</td>" +
    gezahlt.map((v, i) => {
      const dis = aktiv[i] ? "" : "disabled";
      const style = v ? "background-color:#c8f7c5;" : "";
      let displayVal = v ? parseFloat(v).toFixed(2) + " €" : "";
      return `<td class="${podiumClass(i)}"><input type="text" value="${displayVal}" onchange="updateGezahlt(${i}, this.value)" style="${style}" ${dis}></td>`;
    }).join("") +
    "</tr>";

  t.innerHTML = html;
      
}



    render();
  

function setAusstand(i) {
  if (!ausstandLocked[i] && aktiv[i] && ausstand[i] !== "2.50") {
    console.log("Strafausstand aktiviert für Spieler", i);
    saveState();
    ausstand[i] = "2.50";
    ausstandLocked[i] = true;
    render();
  }
}

function updateGezahlt(i, val) {
  if (aktiv[i]) {
    saveState();
    const cleaned = String(val).replace(/[^\d.,-]/g, '').replace(',', '.');
    const num = parseFloat(cleaned);
    if (!isNaN(num)) {
      gezahlt[i] = num.toFixed(2);  // speichere als "0.00"
    } else {
      gezahlt[i] = "";              // falls Eingabe leer/ungültig
    }
    saveToLocalStorage();           // sofort sichern
    render();
  }
}
      function updateOffeneStrafen(i, val) {
  if (aktiv[i]) {
    saveState();
    const cleaned = String(val).replace(/[^\d.,-]/g, '').replace(',', '.');
    const num = parseFloat(cleaned);
    if (!isNaN(num)) {
      offeneStrafen[i] = num.toFixed(2);  // "0.00"
    } else {
      offeneStrafen[i] = "";
    }
    saveToLocalStorage();
    render();
  }
}

    function lockText(label, i, val) {
  if (aktiv[i]) {
    saveState();
    eingabetext[label][i] = val;   // Wert dauerhaft merken
    saveToLocalStorage();          // sofort ins localStorage sichern
  }
}
    


function lockStrafe(r, i, val) {
  if (!spielstrafenLocked[r][i] && aktiv[i]) {
    saveState();
    // entferne alles außer Zahlen, Komma und Punkt, dann Komma->Punkt
    const cleaned = String(val).replace(/[^\d.,-]/g, '').replace(',', '.');
    const num = parseFloat(cleaned);
    if (!isNaN(num)) {
      spielstrafen[r][i] = num.toFixed(2); // z.B. "5.00"
      spielstrafenLocked[r][i] = true;     // Feld sperren
    }
    render();
  }
}


function exportData() {
  const data = {
    spieler,
    clicks, aktiv, eingabetext, textLocked,
    spielstrafen, spielstrafenLocked,
    ausstand, ausstandLocked,
    gezahlt,
    offeneStrafen,
    specialTriggers,
    teamCounts
    
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "kegeln_daten.json";
  a.click();
  URL.revokeObjectURL(url);
}

function importData(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.spieler && Array.isArray(data.spieler) && data.spieler.length) {
  spieler = [...data.spieler];
}
aktiv.length = spieler.length;
ausstand.length = spieler.length;
ausstandLocked.length = spieler.length;
gezahlt.length = spieler.length;
offeneStrafen.length = spieler.length;

eingabetext.Kegelbahn.length = spieler.length;
eingabetext.Runden.length = spieler.length;
textLocked.Kegelbahn.length = spieler.length;
textLocked.Runden.length = spieler.length;

spielstrafen.forEach(r => r.length = spieler.length);
spielstrafenLocked.forEach(r => r.length = spieler.length);

clicks.forEach(r => r.length = spieler.length);
      
      Object.assign(clicks, data.clicks);
      Object.assign(eingabetext, data.eingabetext);
      Object.assign(textLocked, data.textLocked);
      Object.assign(spielstrafen, data.spielstrafen);
      Object.assign(spielstrafenLocked, data.spielstrafenLocked);
      Object.assign(ausstand, data.ausstand);
      Object.assign(ausstandLocked, data.ausstandLocked);
      Object.assign(gezahlt, data.gezahlt);
      data.aktiv.forEach((v, i) => aktiv[i] = v);
      if (data.specialTriggers) specialTriggers = data.specialTriggers;
       if (data.teamCounts) teamCounts = data.teamCounts;
       if (data.offeneStrafen) Object.assign(offeneStrafen, data.offeneStrafen);
      data.aktiv.forEach((v, i) => aktiv[i] = v);
      updateTeamZaehler();
      render();
    } catch (err) {
      alert("Fehler beim Laden der Datei.");
    }
  };
  reader.readAsText(file);
}


// Auto-Speichern bei jedem render()
function saveToLocalStorage() {
  const data = {
    spieler,
    clicks, aktiv, eingabetext, textLocked,
    spielstrafen, spielstrafenLocked,
    ausstand, ausstandLocked,
    gezahlt,
    offeneStrafen,
    specialTriggers,
    teamCounts
  };
  localStorage.setItem("kegelnAppData", JSON.stringify(data));
}

// Rufe beim rendern save auf
