<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎯 Runden</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/runden.css">

</head>

<body>

<header class="app-header">

    <button class="nav-button"
        onclick="window.location.href='index.html'">
        ← Saisonübersicht
    </button>

    <div class="header-center">

        <div class="header-title">
            🎯 Rundenbuch
        </div>

        <div class="header-subtitle">
            Offene Getränkerunden
        </div>

    </div>

</header>

<div class="card">

    <div class="toolbar" style="justify-content:flex-end;">

        <button class="btn" onclick="openRoundModal()">
            🍺 Neue Runde
        </button>

    </div>

</div>

<div id="roundsContainer"></div>

<hr style="margin:40px 0;">

<h2>📚 Historie</h2>

<div id="historyContainer"></div>

<!-- Modal -->

<!-- Neue Runde Modal -->

<div id="roundModal"
style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;">

<div style="
max-width:420px;
margin:12vh auto;
background:white;
padding:20px;
border-radius:14px;">

<h2>🍺 Neue Runde</h2>

<label>Spieler</label>

<select id="roundPlayer"
style="width:100%;padding:10px;margin:8px 0 15px;"></select>

<label>Grund</label>

<input
id="roundReason"
type="text"
placeholder="z.B. Bier wegen Alle 9"
style="width:100%;padding:10px;margin:8px 0 15px;">

<label>Datum</label>

<input
id="roundDate"
type="date"
style="width:100%;padding:10px;margin:8px 0 20px;">

<div style="display:flex;gap:10px;justify-content:flex-end;">

<button class="btn"
onclick="closeRoundModal()">

Abbrechen

</button>

<button class="btn"
onclick="saveRound()">

💾 Speichern

</button>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/runden.js"></script>

</body>
</html>
